<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ninja 3D: Multi-World</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --ui-panel: rgba(0,0,0,0.8); }
        body { margin: 0; overflow: hidden; background: var(--bg); touch-action: none; user-select: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background 0.5s ease; }
        #ui { position: absolute; top: 20px; left: 20px; color: var(--main); pointer-events: none; z-index: 10; }
        .stats { font-size: 14px; font-weight: bold; background: var(--ui-panel); padding: 15px; border-radius: 12px; border: 1px solid var(--main); backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        #top-right { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .circle-btn { width: 50px; height: 50px; background: var(--ui-panel); border: 2px solid var(--main); border-radius: 50%; color: var(--main); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; transition: 0.3s; }
        .circle-btn:hover { transform: scale(1.1); background: var(--main); color: #000; }

        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; align-items: flex-end; pointer-events: none; padding: 0 20px; box-sizing: border-box; }
        #joystick { width: 120px; height: 120px; background: rgba(255,255,255,0.05); border: 2px solid var(--main); border-radius: 50%; position: relative; pointer-events: auto; }
        #stick { width: 40px; height: 40px; background: var(--main); border-radius: 50%; position: absolute; left: 40px; top: 40px; box-shadow: 0 0 20px var(--main); }
        
        .action-btns { display: flex; flex-direction: column; gap: 15px; pointer-events: none; }
        .btn { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px; pointer-events: auto; cursor: pointer; border: 3px solid; transition: transform 0.1s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn:active { transform: scale(0.9); }
        #sword-btn { background: rgba(0, 255, 136, 0.4); border-color: #00ff88; }
        #bow-btn { background: rgba(0, 200, 255, 0.4); border-color: #00c8ff; }
        #speed-tag { color: #ffeb3b; display: none; font-size: 12px; margin-top: 5px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stats">
            ОЧКИ: <span id="score-val">0</span> | ОНЛАЙН: <span id="online-count">1</span>
            <div id="speed-tag">⚡ СУПЕР СКОРОСТЬ АКТИВНА</div>
        </div>
    </div>

    <div id="top-right">
        <div id="theme-btn" class="circle-btn" title="Сменить день/ночь">🌙</div>
    </div>

    <div id="controls">
        <div id="joystick"><div id="stick"></div></div>
        <div class="action-btns">
            <div id="bow-btn" class="btn">ЛУК</div>
            <div id="sword-btn" class="btn">МЕЧ</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ИНИЦИАЛИЗАЦИЯ ---
        const SB_URL = 'https://olicbodhjgfotfgiodfr.supabase.co';
        const SB_KEY = 'sb_publishable_4y90bVcBOvGok71eftoLzw_G6xeP9bn';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        const myId = 'p' + Math.floor(Math.random() * 10000);
        const shapes = {}, others = {}, particles = [], arrows = [], bonuses = {};
        const MAP_SIZE = 50;
        let isMaster = false;
        let score = 0;
        let moveSpeed = 0.18;
        let isNight = true;

        // --- СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(10, 20, 10);
        scene.add(sunLight);

        const grid = new THREE.GridHelper(100, 50, 0x00ff88, 0x222222);
        scene.add(grid);

        // --- ИГРОК МОДЕЛЬ ---
        const player = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.7, 4, 10), new THREE.MeshStandardMaterial({ color: 0x00ff88 }));
        body.position.y = 0.65;
        player.add(body);

        const swordModel = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.9, 0.1), new THREE.MeshStandardMaterial({ color: 0xcccccc }));
        swordModel.position.set(0.4, 0.6, 0.2);
        swordModel.rotation.x = Math.PI/3;
        player.add(swordModel);

        const bowModel = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.02, 8, 12, Math.PI), new THREE.MeshBasicMaterial({ color: 0x00c8ff }));
        bowModel.position.set(-0.4, 0.7, 0);
        bowModel.rotation.y = Math.PI/2;
        player.add(bowModel);
        
        scene.add(player);

        // --- ФУНКЦИИ ГЕЙМПЛЕЯ ---
        function createExplosion(pos, color) {
            for(let i=0; i<12; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({ color }));
                p.position.copy(pos);
                p.userData = { v: new THREE.Vector3((Math.random()-0.5)*0.4, Math.random()*0.4, (Math.random()-0.5)*0.4), l: 1.0 };
                scene.add(p);
                particles.push(p);
            }
        }

        function createShape(id, type, x, z, color) {
            let geo;
            switch(type) {
                case 0: geo = new THREE.BoxGeometry(0.8, 0.8, 0.8); break;
                case 1: geo = new THREE.SphereGeometry(0.5); break;
                case 2: geo = new THREE.ConeGeometry(0.5, 1); break;
                case 3: geo = new THREE.OctahedronGeometry(0.6); break;
                default: geo = new THREE.IcosahedronGeometry(0.6);
            }
            const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color }));
            mesh.position.set(x, 0.5, z);
            scene.add(mesh);
            shapes[id] = mesh;
        }

        function spawnBonus(id, x, z) {
            const group = new THREE.Group();
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.05, 8, 20), new THREE.MeshBasicMaterial({ color: 0xffeb3b }));
            const core = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            group.add(ring, core);
            group.position.set(x, 0.7, z);
            scene.add(group);
            bonuses[id] = group;
        }

        function updateWorldTheme(night) {
            isNight = night;
            const targetColor = isNight ? 0x050505 : 0x87ceeb;
            const lightIntensity = isNight ? 0.4 : 1.2;
            
            scene.background.set(targetColor);
            ambientLight.intensity = lightIntensity;
            document.body.style.background = isNight ? "#050505" : "#87ceeb";
            document.getElementById('theme-btn').innerText = isNight ? "🌙" : "☀️";
        }

        // --- СЕТЬ (SUPABASE) ---
        const channel = sb.channel('mega_sync', { config: { broadcast: { self: false }, presence: { key: myId } } });

        channel
            .on('presence', { event: 'sync' }, () => {
                const state = channel.presenceState();
                isMaster = (Object.keys(state).sort()[0] === myId);
                document.getElementById('online-count').innerText = Object.keys(state).length;
            })
            .on('broadcast', { event: 'move' }, ({ payload }) => {
                if(!others[payload.id]) {
                    others[payload.id] = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.7), new THREE.MeshBasicMaterial({ color: 0xff0055, wireframe: true }));
                    scene.add(others[payload.id]);
                }
                others[payload.id].position.set(payload.x, 0.65, payload.z);
                others[payload.id].rotation.y = payload.r;
            })
            .on('broadcast', { event: 'hit' }, ({ payload }) => {
                if(shapes[payload.sid]) {
                    createExplosion(shapes[payload.sid].position, shapes[payload.sid].material.color);
                    scene.remove(shapes[payload.sid]);
                    delete shapes[payload.sid];
                }
            })
            .on('broadcast', { event: 'theme' }, ({ payload }) => updateWorldTheme(payload.isNight))
            .on('broadcast', { event: 'bonus_take' }, ({ payload }) => {
                if(bonuses[payload.bid]) {
                    scene.remove(bonuses[payload.bid]);
                    delete bonuses[payload.bid];
                }
            })
            .subscribe();

        // --- УПРАВЛЕНИЕ ---
        let moveDir = { x: 0, z: 0 };
        const joystick = document.getElementById('joystick'), stick = document.getElementById('stick');

        joystick.ontouchmove = (e) => {
            const rect = joystick.getBoundingClientRect();
            const dx = e.touches[0].clientX - (rect.left + 60);
            const dy = e.touches[0].clientY - (rect.top + 60);
            const d = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
            const a = Math.atan2(dy, dx);
            moveDir = { x: Math.cos(a)*(d/40), z: Math.sin(a)*(d/40) };
            stick.style.transform = `translate(${moveDir.x*40}px, ${moveDir.z*40}px)`;
        };
        joystick.ontouchend = () => { moveDir = {x:0, z:0}; stick.style.transform = 'none'; };

        document.getElementById('theme-btn').onclick = () => {
            const nextNight = !isNight;
            updateWorldTheme(nextNight);
            channel.send({ type: 'broadcast', event: 'theme', payload: { isNight: nextNight } });
        };

        document.getElementById('sword-btn').ontouchstart = (e) => {
            e.preventDefault();
            swordModel.rotation.x = -Math.PI/2;
            setTimeout(() => swordModel.rotation.x = Math.PI/3, 150);
            Object.keys(shapes).forEach(id => {
                if(player.position.distanceTo(shapes[id].position) < 2.5) {
                    processHit(id);
                }
            });
        };

        document.getElementById('bow-btn').ontouchstart = (e) => {
            e.preventDefault();
            const arrow = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.8), new THREE.MeshBasicMaterial({ color: 0x00c8ff }));
            arrow.position.copy(player.position).y = 0.7;
            arrow.rotation.y = player.rotation.y;
            arrow.rotation.x = Math.PI/2;
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(player.quaternion);
            arrow.userData = { dir, speed: 0.7, life: 60 };
            scene.add(arrow);
            arrows.push(arrow);
        };

        function processHit(id) {
            if(!shapes[id]) return;
            createExplosion(shapes[id].position, shapes[id].material.color);
            scene.remove(shapes[id]);
            delete shapes[id];
            score += 10;
            document.getElementById('score-val').innerText = score;
            channel.send({ type: 'broadcast', event: 'hit', payload: { sid: id } });
        }

        // --- ГЕНЕРАЦИЯ ОБЪЕКТОВ ---
        for(let i=0; i<60; i++) {
            createShape('s'+i, Math.floor(Math.random()*5), (Math.random()-0.5)*MAP_SIZE, (Math.random()-0.5)*MAP_SIZE, Math.random()*0xffffff);
        }
        for(let i=0; i<5; i++) {
            spawnBonus('b'+i, (Math.random()-0.5)*MAP_SIZE, (Math.random()-0.5)*MAP_SIZE);
        }

        // --- ГЛАВНЫЙ ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Движение игрока
            if(moveDir.x || moveDir.z) {
                player.position.x += moveDir.x * moveSpeed;
                player.position.z += moveDir.z * moveSpeed;
                player.rotation.y = Math.atan2(-moveDir.x, -moveDir.z);
                channel.send({ type: 'broadcast', event: 'move', payload: { id: myId, x: player.position.x, z: player.position.z, r: player.rotation.y } });
            }

            // Стрелы
            for(let i=arrows.length-1; i>=0; i--) {
                const a = arrows[i];
                a.position.addScaledVector(a.userData.dir, a.userData.speed);
                a.userData.life--;
                Object.keys(shapes).forEach(id => {
                    if(shapes[id] && a.position.distanceTo(shapes[id].position) < 1) {
                        processHit(id);
                        a.userData.life = 0;
                    }
                });
                if(a.userData.life <= 0) { scene.remove(a); arrows.splice(i,1); }
            }

            // Бонусы
            Object.keys(bonuses).forEach(id => {
                bonuses[id].rotation.y += 0.05;
                if(player.position.distanceTo(bonuses[id].position) < 1.2) {
                    scene.remove(bonuses[id]);
                    delete bonuses[id];
                    channel.send({ type: 'broadcast', event: 'bonus_take', payload: { bid: id } });
                    
                    moveSpeed = 0.4;
                    document.getElementById('speed-tag').style.display = 'block';
                    setTimeout(() => {
                        moveSpeed = 0.18;
                        document.getElementById('speed-tag').style.display = 'none';
                    }, 5000);
                }
            });

            // Эффекты частиц
            for(let i=particles.length-1; i>=0; i--) {
                particles[i].position.add(particles[i].userData.v);
                particles[i].userData.l -= 0.02;
                particles[i].material.opacity = particles[i].userData.l;
                if(particles[i].userData.l <= 0) { scene.remove(particles[i]); particles.splice(i,1); }
            }

            camera.position.lerp(new THREE.Vector3(player.position.x, 12, player.position.z+16), 0.1);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
