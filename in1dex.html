<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NatokinaseNinja3D</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --ui-panel: rgba(0,0,0,0.8); }
        body { margin: 0; overflow: hidden; background: var(--bg); touch-action: none; user-select: none; font-family: sans-serif; transition: background 0.3s; }
        #ui { position: absolute; top: 20px; left: 20px; color: var(--main); pointer-events: none; z-index: 10; }
        .stats { font-size: 14px; font-weight: bold; background: var(--ui-panel); padding: 12px; border-radius: 10px; border: 1px solid var(--main); backdrop-filter: blur(10px); }
        #theme-toggle { position: absolute; top: 20px; right: 20px; width: 50px; height: 50px; background: var(--ui-panel); border: 2px solid var(--main); border-radius: 50%; color: var(--main); display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto; z-index: 100; font-size: 24px; }
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; align-items: center; pointer-events: none; }
        #joystick { width: 100px; height: 100px; background: rgba(255,255,255,0.05); border: 2px solid var(--main); border-radius: 50%; position: relative; pointer-events: auto; }
        #stick { width: 35px; height: 35px; background: var(--main); border-radius: 50%; position: absolute; left: 32.5px; top: 32.5px; box-shadow: 0 0 15px var(--main); }
        #attack-btn { width: 80px; height: 80px; background: rgba(255, 0, 85, 0.3); border: 3px solid #ff0055; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stats">
            ОЧКИ: <span id="score-val">0</span> | ОНЛАЙН: <span id="online-count">1</span><br>
            <small id="role-tag" style="opacity:0.6">Синхронизация...</small>
        </div>
    </div>

    <div id="theme-toggle">🌙</div>

    <div id="controls">
        <div id="joystick"><div id="stick"></div></div>
        <div id="attack-btn">УДАР</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const SB_URL = 'https://olicbodhjgfotfgiodfr.supabase.co';
        const SB_KEY = 'sb_publishable_4y90bVcBOvGok71eftoLzw_G6xeP9bn';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        const myId = 'p' + Math.floor(Math.random() * 10000);
        const shapes = {}, others = {}, particles = [];
        const colors = [0x00ffff, 0xff00ff, 0xffff00, 0x00ff88, 0xff8800, 0xff0055];
        const MAP_SIZE = 30;
        const SHAPE_COUNT = 112; 
        let isMaster = false;
        let isDarkMode = true;

        function seededRandom(s) {
            const x = Math.sin(s) * 10000;
            return x - Math.floor(x);
        }

        // --- СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const grid = new THREE.GridHelper(100, 40, 0x00ff88, 0x111111);
        scene.add(grid);

        const playerGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.7, 4, 10), new THREE.MeshStandardMaterial({ color: 0x00ff88 }));
        body.position.y = 0.65;
        playerGroup.add(body);
        const sword = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.04, 1.1), new THREE.MeshBasicMaterial({ color: 0xffffff }));
        sword.position.set(0.35, 1, 0.35); sword.rotation.x = Math.PI/4;
        playerGroup.add(sword);
        scene.add(playerGroup);

        // --- ЭФФЕКТЫ ---
        function createExplosion(pos, color) {
            for(let i = 0; i < 10; i++) {
                const p = new THREE.Mesh(
                    new THREE.BoxGeometry(0.12, 0.12, 0.12),
                    new THREE.MeshBasicMaterial({ color: color, transparent: true })
                );
                p.position.copy(pos);
                p.userData = { 
                    vel: new THREE.Vector3((Math.random()-0.5)*0.4, Math.random()*0.4, (Math.random()-0.5)*0.4), 
                    life: 1.0 
                };
                scene.add(p);
                particles.push(p);
            }
        }

        function updateParticles() {
            for(let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.position.add(p.userData.vel);
                p.userData.vel.y -= 0.02;
                p.userData.life -= 0.04;
                p.material.opacity = p.userData.life;
                if(p.userData.life <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                }
            }
        }

        function applyTheme(dark) {
            isDarkMode = dark;
            document.getElementById('theme-toggle').innerText = isDarkMode ? "🌙" : "☀️";
            const bgColor = isDarkMode ? 0x050505 : 0xeeeeee;
            scene.background.set(bgColor);
            grid.material.color.set(isDarkMode ? 0x00ff88 : 0x444444);
            document.documentElement.style.setProperty('--bg', isDarkMode ? '#050505' : '#eeeeee');
        }

        function spawnShape(id, x, z, cIdx) {
            if(shapes[id]) scene.remove(shapes[id]);
            const mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(0.5), new THREE.MeshStandardMaterial({ color: colors[cIdx] }));
            mesh.position.set(x, 0.5, z);
            scene.add(mesh);
            shapes[id] = mesh;
        }

        // Стартовый спаун
        for(let i=0; i < SHAPE_COUNT; i++) {
            const x = (seededRandom(i) - 0.5) * MAP_SIZE;
            const z = (seededRandom(i + 555) - 0.5) * MAP_SIZE;
            spawnShape('s_'+i, x, z, i % colors.length);
        }

        // --- СЕТЬ ---
        const channel = sb.channel('sync_final', { config: { broadcast: { self: true }, presence: { key: myId } } });

        channel
            .on('presence', { event: 'sync' }, () => {
                const state = channel.presenceState();
                const sortedKeys = Object.keys(state).sort();
                isMaster = (sortedKeys[0] === myId);
                document.getElementById('online-count').innerText = sortedKeys.length;
                document.getElementById('role-tag').innerText = isMaster ? "ХОСТ" : "ИГРОК";
            })
            .on('broadcast', { event: 'move' }, ({ payload }) => {
                if(payload.id === myId) return;
                if(!others[payload.id]) {
                    others[payload.id] = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.7, 4, 8), new THREE.MeshStandardMaterial({color: 0xff0055}));
                    scene.add(others[payload.id]);
                }
                others[payload.id].position.set(payload.x, 0.65, payload.z);
                others[payload.id].rotation.y = payload.r;
            })
            .on('broadcast', { event: 'hit' }, ({ payload }) => {
                if(shapes[payload.sid]) {
                    // Создаем брызги у всех игроков на месте удара
                    createExplosion(shapes[payload.sid].position, shapes[payload.sid].material.color);
                    scene.remove(shapes[payload.sid]);
                    delete shapes[payload.sid];
                }
            })
            .on('broadcast', { event: 'respawn' }, ({ payload }) => {
                spawnShape(payload.sid, payload.nx, payload.nz, payload.nc);
            })
            .on('broadcast', { event: 'theme_change' }, ({ payload }) => {
                applyTheme(payload.dark);
            })
            .subscribe();

        // --- УПРАВЛЕНИЕ ---
        document.getElementById('theme-toggle').onclick = () => {
            channel.send({ type: 'broadcast', event: 'theme_change', payload: { dark: !isDarkMode } });
        };

        let moveDir = { x: 0, z: 0 }, isAttacking = false, score = 0;

        function attack() {
            if(isAttacking) return;
            isAttacking = true;
            Object.keys(shapes).forEach(id => {
                if(playerGroup.position.distanceTo(shapes[id].position) < 2.2) {
                    // Отправляем сигнал удара (брызги создадутся через обработчик hit выше)
                    channel.send({ type: 'broadcast', event: 'hit', payload: { sid: id } });
                    
                    score++; document.getElementById('score-val').innerText = score;
                    if(isMaster) {
                        setTimeout(() => {
                            const nx = (Math.random()-0.5)*MAP_SIZE;
                            const nz = (Math.random()-0.5)*MAP_SIZE;
                            const nc = Math.floor(Math.random()*colors.length);
                            channel.send({ type: 'broadcast', event: 'respawn', payload: { sid: id, nx, nz, nc } });
                            spawnShape(id, nx, nz, nc);
                        }, 500);
                    }
                }
            });
            setTimeout(() => isAttacking = false, 300);
        }

        const joystick = document.getElementById('joystick'), stick = document.getElementById('stick');
        joystick.addEventListener('touchmove', (e) => {
            const rect = joystick.getBoundingClientRect();
            const dx = e.touches[0].clientX - (rect.left + rect.width/2);
            const dy = e.touches[0].clientY - (rect.top + rect.height/2);
            const d = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
            const a = Math.atan2(dy, dx);
            moveDir = { x: Math.cos(a)*(d/40), z: Math.sin(a)*(d/40) };
            stick.style.transform = `translate(${moveDir.x*40}px, ${moveDir.z*40}px)`;
        });
        joystick.addEventListener('touchend', () => { moveDir = {x:0, z:0}; stick.style.transform = 'none'; });
        document.getElementById('attack-btn').addEventListener('touchstart', (e) => { e.preventDefault(); attack(); });

        function animate() {
            requestAnimationFrame(animate);
            updateParticles();
            if(moveDir.x || moveDir.z) {
                playerGroup.position.x += moveDir.x * 0.16;
                playerGroup.position.z += moveDir.z * 0.16;
                playerGroup.rotation.y = Math.atan2(-moveDir.x, -moveDir.z);
                channel.send({ type: 'broadcast', event: 'move', payload: { id: myId, x: playerGroup.position.x, z: playerGroup.position.z, r: playerGroup.rotation.y } });
            }
            camera.position.lerp(new THREE.Vector3(playerGroup.position.x, 10, playerGroup.position.z + 14), 0.1);
            camera.lookAt(playerGroup.position);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
<script src="https://dmamax.netlify.app/legal-module.js"></script>

</body>
</html>
