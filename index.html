<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NatokinaseNinja3D</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --ui-panel: rgba(0,0,0,0.8); }
        body { margin: 0; overflow: hidden; background: var(--bg); touch-action: none; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: var(--main); pointer-events: none; z-index: 10; }
        .stats { font-size: 14px; font-weight: bold; background: var(--ui-panel); padding: 12px; border-radius: 10px; border: 1px solid var(--main); }
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
        #joystick { width: 80px; height: 80px; border: 2px solid var(--main); border-radius: 50%; position: relative; pointer-events: auto; }
        #stick { width: 30px; height: 30px; background: var(--main); border-radius: 50%; position: absolute; left: 25px; top: 25px; }
        .btn { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; pointer-events: auto; }
        #bow-btn { background: rgba(0, 136, 255, 0.4); border: 2px solid #0088ff; }
        #attack-btn { background: rgba(255, 0, 85, 0.4); border: 2px solid #ff0055; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stats">
            ОЧКИ: <span id="score-val">0</span> | ОНЛАЙН: <span id="online-count">1</span><br>
            <small id="role-tag" style="opacity:0.6">Загрузка...</small>
        </div>
    </div>

    <div id="controls">
        <div id="joystick"><div id="stick"></div></div>
        <div id="bow-btn" class="btn">ЛУК</div>
        <div id="attack-btn" class="btn">УДАР</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        // --- КОНФИГ ---
        const WORLD_SEED = 123;
        const MAP_SIZE = 45;
        const SHAPE_COUNT = 90;
        const SB_URL = 'https://olicbodhjgfotfgiodfr.supabase.co';
        const SB_KEY = 'sb_publishable_4y90bVcBOvGok71eftoLzw_G6xeP9bn';
        const sb = supabase.createClient(SB_URL, SB_KEY);
        const myId = 'p' + Math.floor(Math.random() * 10000);

        let isMaster = false;
        let score = 0;
        const shapes = {}, others = {}, arrows = [], particles = [];

        // --- СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 500);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // Отключаем AA для скорости на мобилках
        renderer.setPixelRatio(window.devicePixelRatio > 1 ? 1.5 : 1); // Ограничиваем DPI для FPS
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(10, 20, 10);
        scene.add(light, new THREE.AmbientLight(0x404040));
        scene.add(new THREE.GridHelper(100, 40, 0x00ff88, 0x111111));

        // --- ГЕОМЕТРИИ (создаем один раз) ---
        const geoms = [
            new THREE.BoxGeometry(0.7, 0.7, 0.7),
            new THREE.SphereGeometry(0.4, 8, 8),
            new THREE.OctahedronGeometry(0.6)
        ];
        const colors = [0x00ff88, 0x0088ff, 0xff0055, 0xffff00];

        // --- ИГРОК ---
        const playerGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.6, 4, 8), new THREE.MeshStandardMaterial({ color: 0x00ff88 }));
        body.position.y = 0.6;
        const sword = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.8, 0.05), new THREE.MeshBasicMaterial({ color: 0xffffff }));
        sword.position.set(0.4, 0.7, 0.3); sword.rotation.x = Math.PI/3;
        playerGroup.add(body, sword);
        scene.add(playerGroup);

        // --- БЫСТРАЯ ГЕНЕРАЦИЯ ---
        function seededRandom(s) {
            const x = Math.sin(s) * 10000;
            return x - Math.floor(x);
        }

        function initWorld() {
            for(let i=0; i<SHAPE_COUNT; i++) {
                const id = 's_'+i;
                const seedX = WORLD_SEED + i;
                const seedZ = WORLD_SEED + i + 500;
                
                const x = (seededRandom(seedX) - 0.5) * MAP_SIZE;
                const z = (seededRandom(seedZ) - 0.5) * MAP_SIZE;
                const gIdx = Math.floor(seededRandom(seedX + 100) * geoms.length);
                const cIdx = i % colors.length;

                const mesh = new THREE.Mesh(geoms[gIdx], new THREE.MeshStandardMaterial({ color: colors[cIdx] }));
                mesh.position.set(x, 0.5, z);
                scene.add(mesh);
                shapes[id] = mesh;
            }
        }

        // --- СЕТЕВАЯ ЧАСТЬ ---
        const ch = sb.channel('ninja_sync', { config: { broadcast: { self: true }, presence: { key: myId } } });

        ch.on('presence', { event: 'sync' }, () => {
            const state = ch.presenceState();
            isMaster = Object.keys(state).sort()[0] === myId;
            document.getElementById('online-count').innerText = Object.keys(state).length;
            document.getElementById('role-tag').innerText = isMaster ? "МАСТЕР МИРА" : "ИГРОК";
        })
        .on('broadcast', { event: 'm' }, ({ payload }) => { // короткое имя 'm' вместо 'move' экономит трафик
            if(payload.id === myId) return;
            if(!others[payload.id]) {
                others[payload.id] = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.6, 4, 8), new THREE.MeshBasicMaterial({color: 0xff0055}));
                scene.add(others[payload.id]);
            }
            others[payload.id].position.set(payload.x, 0.6, payload.z);
            others[payload.id].rotation.y = payload.r;
        })
        .on('broadcast', { event: 'h' }, ({ payload }) => { // 'h' = hit
            const s = shapes[payload.sid];
            if(s) {
                s.visible = false; // Просто скрываем, это быстрее чем удалять
                s.position.set(0, -10, 0); // Убираем под землю
            }
        })
        .on('broadcast', { event: 'r' }, ({ payload }) => { // 'r' = respawn
            const s = shapes[payload.sid];
            if(s) {
                s.position.set(payload.nx, 0.5, payload.nz);
                s.visible = true;
            }
        })
        .subscribe();

        // --- БОЙ ---
        function hit(id) {
            ch.send({ type: 'broadcast', event: 'h', payload: { sid: id } });
            score++;
            document.getElementById('score-val').innerText = score;
            if(isMaster) {
                setTimeout(() => {
                    const nx = (Math.random()-0.5)*MAP_SIZE;
                    const nz = (Math.random()-0.5)*MAP_SIZE;
                    ch.send({ type: 'broadcast', event: 'r', payload: { sid: id, nx, nz } });
                }, 1500);
            }
        }

        // --- УПРАВЛЕНИЕ ---
        let joyPos = { x: 0, z: 0 };
        const stick = document.getElementById('stick'), joy = document.getElementById('joystick');
        
        joy.addEventListener('touchmove', e => {
            const r = joy.getBoundingClientRect(), 
                  dx = e.touches[0].clientX - (r.left + 40), 
                  dy = e.touches[0].clientY - (r.top + 40),
                  d = Math.min(Math.sqrt(dx*dx+dy*dy), 30);
            joyPos = { x: (dx/30)*(d/30), z: (dy/30)*(d/30) };
            stick.style.transform = `translate(${joyPos.x*30}px,${joyPos.z*30}px)`;
        });
        joy.addEventListener('touchend', () => { joyPos = {x:0,z:0}; stick.style.transform='none'; });

        document.getElementById('attack-btn').addEventListener('touchstart', e => {
            e.preventDefault();
            sword.rotation.z = Math.PI/2;
            Object.keys(shapes).forEach(id => {
                if(shapes[id].visible && playerGroup.position.distanceTo(shapes[id].position) < 2) hit(id);
            });
            setTimeout(() => sword.rotation.z = 0, 100);
        });

        document.getElementById('bow-btn').addEventListener('touchstart', e => {
            e.preventDefault();
            const a = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.5), new THREE.MeshBasicMaterial({color: 0x0088ff}));
            a.position.copy(playerGroup.position).add(new THREE.Vector3(0,0.8,0));
            a.rotation.y = playerGroup.rotation.y;
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(playerGroup.quaternion);
            a.userData = { v: dir.multiplyScalar(0.8), l: 60 };
            scene.add(a); arrows.push(a);
        });

        // --- ЦИКЛ ---
        function loop() {
            requestAnimationFrame(loop);

            arrows.forEach((a, i) => {
                a.position.add(a.userData.v);
                if(--a.userData.l <= 0) { scene.remove(a); arrows.splice(i,1); }
                Object.keys(shapes).forEach(id => {
                    if(shapes[id].visible && a.position.distanceTo(shapes[id].position) < 1.2) {
                        hit(id); a.userData.l = 0;
                    }
                });
            });

            if(joyPos.x || joyPos.z) {
                playerGroup.position.x += joyPos.x * 0.2;
                playerGroup.position.z += joyPos.z * 0.2;
                playerGroup.rotation.y = Math.atan2(-joyPos.x, -joyPos.z);
                ch.send({ type: 'broadcast', event: 'm', payload: { id: myId, x: playerGroup.position.x, z: playerGroup.position.z, r: playerGroup.rotation.y } });
            }

            camera.position.lerp(new THREE.Vector3(playerGroup.position.x, 12, playerGroup.position.z + 14), 0.1);
            camera.lookAt(playerGroup.position);
            renderer.render(scene, camera);
        }

        initWorld();
        loop();

        window.onresize = () => {
            camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
<script src="https://dmamax.netlify.app/legal-module.js"></script>

</body>
</html>
