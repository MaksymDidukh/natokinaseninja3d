<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NatokinaseNinja3D</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --ui-panel: rgba(0,0,0,0.8); --accent: #0088ff; --danger: #ff0055; }
        body { margin: 0; overflow: hidden; background: var(--bg); touch-action: none; user-select: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #ui { position: absolute; top: 20px; left: 20px; color: var(--main); pointer-events: none; z-index: 10; }
        .stats { font-size: 14px; font-weight: bold; background: var(--ui-panel); padding: 12px; border-radius: 10px; border: 1px solid var(--main); backdrop-filter: blur(10px); box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        
        #theme-toggle { position: absolute; top: 20px; right: 20px; width: 50px; height: 50px; background: var(--ui-panel); border: 2px solid var(--main); border-radius: 50%; color: var(--main); display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto; z-index: 100; font-size: 24px; }
        
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; align-items: center; pointer-events: none; padding: 0 10px; box-sizing: border-box; }
        
        #joystick { width: 100px; height: 100px; background: rgba(255,255,255,0.05); border: 2px solid var(--main); border-radius: 50%; position: relative; pointer-events: auto; }
        #stick { width: 35px; height: 35px; background: var(--main); border-radius: 50%; position: absolute; left: 32.5px; top: 32.5px; box-shadow: 0 0 15px var(--main); }
        
        .btn { width: 75px; height: 75px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; pointer-events: auto; font-size: 12px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.9); }
        
        #bow-btn { background: rgba(0, 136, 255, 0.3); border: 3px solid var(--accent); box-shadow: 0 0 15px var(--accent); }
        #attack-btn { background: rgba(255, 0, 85, 0.3); border: 3px solid var(--danger); box-shadow: 0 0 15px var(--danger); }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stats">
            ОЧКИ: <span id="score-val">0</span> | ОНЛАЙН: <span id="online-count">1</span><br>
            <small id="role-tag" style="opacity:0.6">Загрузка мира...</small>
        </div>
    </div>

    <div id="theme-toggle">🌙</div>

    <div id="controls">
        <div id="joystick"><div id="stick"></div></div>
        <div id="bow-btn" class="btn">ЛУК</div>
        <div id="attack-btn" class="btn">УДАР</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const SB_URL = 'https://olicbodhjgfotfgiodfr.supabase.co';
        const SB_KEY = 'sb_publishable_4y90bVcBOvGok71eftoLzw_G6xeP9bn';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        const myId = 'p' + Math.floor(Math.random() * 10000);
        const shapes = {}, others = {}, particles = [], arrows = [];
        const colors = [0x00ffff, 0xff00ff, 0xffff00, 0x00ff88, 0xff8800, 0xff0055];
        
        // Список геометрий для разнообразия
        const geometries = [
            new THREE.BoxGeometry(0.8, 0.8, 0.8),       // Куб
            new THREE.SphereGeometry(0.5, 16, 16),     // Шар
            new THREE.ConeGeometry(0.5, 1, 16),        // Конус
            new THREE.CylinderGeometry(0.4, 0.4, 0.8), // Цилиндр
            new THREE.OctahedronGeometry(0.6)          // Ромбик
        ];

        const MAP_SIZE = 40;
        const SHAPE_COUNT = 90; 
        let isMaster = false;
        let isDarkMode = true;
        let score = 0;

        function seededRandom(s) {
            const x = Math.sin(s) * 10000;
            return x - Math.floor(x);
        }

        // --- СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const grid = new THREE.GridHelper(100, 50, 0x00ff88, 0x111111);
        scene.add(grid);

        // --- ИГРОК ---
        const playerGroup = new THREE.Group();
        const bodyMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.7, 4, 10), new THREE.MeshStandardMaterial({ color: 0x00ff88 }));
        bodyMesh.position.y = 0.65;
        playerGroup.add(bodyMesh);

        const sword = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.04, 1.1), new THREE.MeshBasicMaterial({ color: 0xffffff }));
        sword.position.set(0.4, 0.8, 0.4); 
        sword.rotation.x = Math.PI/4;
        playerGroup.add(sword);
        scene.add(playerGroup);

        // --- ЭФФЕКТЫ ---
        function createExplosion(pos, color) {
            for(let i = 0; i < 8; i++) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.15), new THREE.MeshBasicMaterial({ color: color, transparent: true }));
                p.position.copy(pos);
                p.userData = { vel: new THREE.Vector3((Math.random()-0.5)*0.5, Math.random()*0.4, (Math.random()-0.5)*0.5), life: 1.0 };
                scene.add(p);
                particles.push(p);
            }
        }

        // --- ФУНКЦИЯ СПАВНА РАЗНЫХ ФИГУР ---
        function spawnShape(id, x, z, cIdx, gIdx = 0) {
            if(shapes[id]) scene.remove(shapes[id]);
            
            // Используем индекс геометрии gIdx
            const geom = geometries[gIdx % geometries.length];
            const mesh = new THREE.Mesh(geom, new THREE.MeshStandardMaterial({ 
                color: colors[cIdx % colors.length], 
                metalness: 0.4, 
                roughness: 0.3 
            }));
            
            mesh.position.set(x, 0.6, z);
            mesh.rotation.set(Math.random(), Math.random(), Math.random());
            scene.add(mesh);
            shapes[id] = mesh;
        }

        // Первичная генерация с разными типами
        for(let i=0; i < SHAPE_COUNT; i++) {
            const gIndex = Math.floor(seededRandom(i+99) * geometries.length);
            spawnShape('s_'+i, (seededRandom(i)-0.5)*MAP_SIZE, (seededRandom(i+555)-0.5)*MAP_SIZE, i % colors.length, gIndex);
        }

        // --- СЕТЕВАЯ ЛОГИКА ---
        const channel = sb.channel('sync_final', { config: { broadcast: { self: true }, presence: { key: myId } } });

        channel
            .on('presence', { event: 'sync' }, () => {
                const state = channel.presenceState();
                isMaster = (Object.keys(state).sort()[0] === myId);
                document.getElementById('online-count').innerText = Object.keys(state).length;
                document.getElementById('role-tag').innerText = isMaster ? "МАСТЕР МИРА" : "ИГРОК";
            })
            .on('broadcast', { event: 'move' }, ({ payload }) => {
                if(payload.id === myId) return;
                if(!others[payload.id]) {
                    others[payload.id] = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.7, 4, 8), new THREE.MeshStandardMaterial({color: 0xff0055}));
                    scene.add(others[payload.id]);
                }
                others[payload.id].position.set(payload.x, 0.65, payload.z);
                others[payload.id].rotation.y = payload.r;
            })
            .on('broadcast', { event: 'hit' }, ({ payload }) => {
                if(shapes[payload.sid]) {
                    createExplosion(shapes[payload.sid].position, shapes[payload.sid].material.color);
                    scene.remove(shapes[payload.sid]);
                    delete shapes[payload.sid];
                }
            })
            .on('broadcast', { event: 'respawn' }, ({ payload }) => {
                spawnShape(payload.sid, payload.nx, payload.nz, payload.nc, payload.ng);
            })
            .on('broadcast', { event: 'theme' }, ({ payload }) => {
                isDarkMode = payload.dark;
                scene.background.set(isDarkMode ? 0x050505 : 0xeeeeee);
                grid.material.color.set(isDarkMode ? 0x00ff88 : 0x444444);
                document.getElementById('theme-toggle').innerText = isDarkMode ? "🌙" : "☀️";
            })
            .subscribe();

        // --- БОЕВКА ---
        function handleHit(id) {
            channel.send({ type: 'broadcast', event: 'hit', payload: { sid: id } });
            score++;
            document.getElementById('score-val').innerText = score;
            if(isMaster) {
                setTimeout(() => {
                    const nx = (Math.random()-0.5)*MAP_SIZE;
                    const nz = (Math.random()-0.5)*MAP_SIZE;
                    const nc = Math.floor(Math.random()*colors.length);
                    const ng = Math.floor(Math.random()*geometries.length);
                    channel.send({ type: 'broadcast', event: 'respawn', payload: { sid: id, nx, nz, nc, ng } });
                    spawnShape(id, nx, nz, nc, ng);
                }, 1000);
            }
        }

        function attack() {
            sword.rotation.z = Math.PI/2; 
            Object.keys(shapes).forEach(id => {
                if(playerGroup.position.distanceTo(shapes[id].position) < 2.5) handleHit(id);
            });
            setTimeout(() => sword.rotation.z = 0, 150);
        }

        function shootBow() {
            const arrow = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 1.0), new THREE.MeshBasicMaterial({ color: 0x0088ff }));
            arrow.position.copy(playerGroup.position);
            arrow.position.y = 1;
            arrow.rotation.y = playerGroup.rotation.y;
            
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(playerGroup.quaternion);
            arrow.userData = { vel: dir.multiplyScalar(0.8), life: 60 };
            
            scene.add(arrow);
            arrows.push(arrow);
        }

        // --- УПРАВЛЕНИЕ ---
        let moveDir = { x: 0, z: 0 };
        const joystick = document.getElementById('joystick'), stick = document.getElementById('stick');
        
        joystick.addEventListener('touchmove', (e) => {
            const rect = joystick.getBoundingClientRect();
            const dx = e.touches[0].clientX - (rect.left + rect.width/2);
            const dy = e.touches[0].clientY - (rect.top + rect.height/2);
            const d = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
            const a = Math.atan2(dy, dx);
            moveDir = { x: Math.cos(a)*(d/40), z: Math.sin(a)*(d/40) };
            stick.style.transform = `translate(${moveDir.x*40}px, ${moveDir.z*40}px)`;
        });
        joystick.addEventListener('touchend', () => { moveDir = {x:0, z:0}; stick.style.transform = 'none'; });
        
        document.getElementById('attack-btn').addEventListener('touchstart', (e) => { e.preventDefault(); attack(); });
        document.getElementById('bow-btn').addEventListener('touchstart', (e) => { e.preventDefault(); shootBow(); });
        document.getElementById('theme-toggle').onclick = () => channel.send({ type: 'broadcast', event: 'theme', payload: { dark: !isDarkMode } });

        // --- ЦИКЛ ИГРЫ ---
        function animate() {
            requestAnimationFrame(animate);

            // Анимация вращения фигур
            Object.values(shapes).forEach(m => { m.rotation.y += 0.02; m.rotation.x += 0.01; });

            // Частицы
            for(let i = particles.length-1; i>=0; i--) {
                particles[i].position.add(particles[i].userData.vel);
                particles[i].userData.life -= 0.03;
                particles[i].material.opacity = particles[i].userData.life;
                if(particles[i].userData.life <= 0) { scene.remove(particles[i]); particles.splice(i, 1); }
            }

            // Стрелы
            for(let i = arrows.length-1; i>=0; i--) {
                arrows[i].position.add(arrows[i].userData.vel);
                arrows[i].userData.life--;
                
                Object.keys(shapes).forEach(id => {
                    if(shapes[id] && arrows[i] && arrows[i].position.distanceTo(shapes[id].position) < 1.3) {
                        handleHit(id);
                        arrows[i].userData.life = 0;
                    }
                });

                if(arrows[i].userData.life <= 0) { scene.remove(arrows[i]); arrows.splice(i, 1); }
            }

            // Движение
            if(moveDir.x || moveDir.z) {
                playerGroup.position.x += moveDir.x * 0.2;
                playerGroup.position.z += moveDir.z * 0.2;
                playerGroup.rotation.y = Math.atan2(-moveDir.x, -moveDir.z);
                channel.send({ type: 'broadcast', event: 'move', payload: { id: myId, x: playerGroup.position.x, z: playerGroup.position.z, r: playerGroup.rotation.y } });
            }

            camera.position.lerp(new THREE.Vector3(playerGroup.position.x, 14, playerGroup.position.z + 16), 0.1);
            camera.lookAt(playerGroup.position);
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
    <script src="https://dmamax.netlify.app/legal-module.js"></script>
</body>
</html>
