<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NatokinaseNinja3D</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --ui-panel: rgba(0,0,0,0.8); }
        body { margin: 0; overflow: hidden; background: var(--bg); touch-action: none; user-select: none; font-family: sans-serif; transition: background 0.3s; }
        
        #ui { position: absolute; top: 20px; left: 20px; color: var(--main); pointer-events: none; z-index: 10; }
        .stats { font-size: 14px; font-weight: bold; background: var(--ui-panel); padding: 15px; border-radius: 10px; border: 1px solid var(--main); backdrop-filter: blur(10px); }
        
        /* Кнопка темы */
        #theme-toggle {
            position: absolute; top: 20px; right: 20px; width: 50px; height: 50px;
            background: var(--ui-panel); border: 2px solid var(--main); border-radius: 50%;
            color: var(--main); display: flex; align-items: center; justify-content: center;
            cursor: pointer; pointer-events: auto; z-index: 100; font-size: 24px; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        #controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-around; align-items: center; pointer-events: none; }
        #joystick { width: 110px; height: 110px; background: rgba(255,255,255,0.05); border: 2px solid var(--main); border-radius: 50%; position: relative; pointer-events: auto; }
        #stick { width: 40px; height: 40px; background: var(--main); border-radius: 50%; position: absolute; left: 35px; top: 35px; box-shadow: 0 0 15px var(--main); }
        #attack-btn { width: 90px; height: 90px; background: rgba(255, 0, 85, 0.3); border: 3px solid #ff0055; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; pointer-events: auto; }
        #role-tag { font-size: 10px; opacity: 0.6; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stats">
            GLOBAL SYNC MMO<br>
            ОЧКИ: <span id="score-val">0</span> | ОНЛАЙН: <span id="online-count">1</span>
            <span id="role-tag">Загрузка мира...</span>
        </div>
    </div>

    <div id="theme-toggle">🌙</div>

    <div id="controls">
        <div id="joystick"><div id="stick"></div></div>
        <div id="attack-btn">УДАР</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const SB_URL = 'https://olicbodhjgfotfgiodfr.supabase.co';
        const SB_KEY = 'sb_publishable_4y90bVcBOvGok71eftoLzw_G6xeP9bn';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        const myId = 'p' + Math.floor(Math.random() * 10000);
        const shapes = {}, others = {}, bonuses = {};
        const colors = [0x00ffff, 0xff00ff, 0xffff00, 0x00ff88, 0xff8800, 0xff0055];
        const MAP_SIZE = 60;
        let isMaster = false;
        let isDarkMode = true;

        // --- ТРЕХМЕРНЫЙ МИР ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 10, 60);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const grid = new THREE.GridHelper(200, 80, 0x00ff88, 0x111111);
        scene.add(grid);

        // Игрок
        const playerGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.7, 4, 10), new THREE.MeshStandardMaterial({ color: 0x00ff88 }));
        body.position.y = 0.65;
        playerGroup.add(body);
        const sword = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.04, 1.2), new THREE.MeshBasicMaterial({ color: 0xffffff }));
        sword.position.set(0.4, 1.1, 0.4); sword.rotation.x = Math.PI/4;
        playerGroup.add(sword);
        scene.add(playerGroup);

        // --- ЛОГИКА ТЕМЫ ---
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.onclick = () => {
            isDarkMode = !isDarkMode;
            themeBtn.innerText = isDarkMode ? "🌙" : "☀️";
            
            const bgColor = isDarkMode ? 0x050505 : 0xeeeeee;
            const gridColor = isDarkMode ? 0x00ff88 : 0x444444;
            const gridFade = isDarkMode ? 0x111111 : 0xcccccc;

            scene.background.set(bgColor);
            scene.fog.color.set(bgColor);
            grid.material.color.set(gridColor);
            grid.material.opacity = isDarkMode ? 0.2 : 0.5;

            document.documentElement.style.setProperty('--bg', isDarkMode ? '#050505' : '#eeeeee');
            document.documentElement.style.setProperty('--main', isDarkMode ? '#00ff88' : '#222222');
            document.documentElement.style.setProperty('--ui-panel', isDarkMode ? 'rgba(0,0,0,0.8)' : 'rgba(255,255,255,0.8)');
        };

        // --- СИНХРОНИЗАЦИЯ ---
        function seededRandom(seed) {
            const x = Math.sin(seed) * 10000;
            return x - Math.floor(x);
        }

        function spawnShape(id, x, z, cIdx) {
            if(shapes[id]) scene.remove(shapes[id]);
            const mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(0.6), new THREE.MeshStandardMaterial({ 
                color: colors[cIdx], emissive: colors[cIdx], emissiveIntensity: 0.4 
            }));
            mesh.position.set(x, 0.6, z);
            scene.add(mesh);
            shapes[id] = mesh;
        }

        // Генерация мира при старте
        for(let i=0; i<40; i++) {
            const x = (seededRandom(i+1)-0.5)*MAP_SIZE;
            const z = (seededRandom(i+2)-0.5)*MAP_SIZE;
            spawnShape('s_'+i, x, z, i % colors.length);
        }

        const channel = sb.channel('mc_sync_final', { config: { broadcast: { self: false }, presence: { key: myId } } });

        channel
            .on('presence', { event: 'sync' }, () => {
                const state = channel.presenceState();
                const presences = Object.keys(state).sort();
                document.getElementById('online-count').innerText = presences.length;
                isMaster = (presences[0] === myId);
                document.getElementById('role-tag').innerText = isMaster ? "Хост мира" : "Синхронизация с хостом";
            })
            .on('broadcast', { event: 'move' }, ({ payload }) => {
                if(!others[payload.id]) {
                    others[payload.id] = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.7, 4, 8), new THREE.MeshStandardMaterial({color: 0xff0055}));
                    scene.add(others[payload.id]);
                }
                others[payload.id].position.set(payload.x, 0.65, payload.z);
                others[payload.id].rotation.y = payload.r;
            })
            .on('broadcast', { event: 'world_event' }, ({ payload }) => {
                if(payload.type === 'hit') {
                    if(shapes[payload.sid]) { scene.remove(shapes[payload.sid]); delete shapes[payload.sid]; }
                }
                if(payload.type === 'respawn') {
                    spawnShape(payload.sid, payload.nx, payload.nz, payload.nc);
                }
            })
            .subscribe();

        // --- УПРАВЛЕНИЕ И ГЕЙМПЛЕЙ ---
        let moveDir = { x: 0, z: 0 }, moveSpeed = 0.15, isAttacking = false, attackTime = 0, score = 0;

        function doAttack() {
            if(isAttacking) return;
            isAttacking = true; attackTime = Date.now();

            Object.keys(shapes).forEach(id => {
                if(playerGroup.position.distanceTo(shapes[id].position) < 2.5) {
                    channel.send({ type: 'broadcast', event: 'world_event', payload: { type: 'hit', sid: id } });
                    scene.remove(shapes[id]); delete shapes[id];
                    score++; document.getElementById('score-val').innerText = score;

                    if(isMaster) {
                        setTimeout(() => {
                            const nx = (Math.random()-0.5)*MAP_SIZE;
                            const nz = (Math.random()-0.5)*MAP_SIZE;
                            const nc = Math.floor(Math.random()*colors.length);
                            channel.send({ type: 'broadcast', event: 'world_event', payload: { type: 'respawn', sid: id, nx, nz, nc } });
                            spawnShape(id, nx, nz, nc);
                        }, 4000);
                    }
                }
            });
            setTimeout(() => isAttacking = false, 300);
        }

        const joystick = document.getElementById('joystick'), stick = document.getElementById('stick');
        joystick.addEventListener('touchmove', (e) => {
            const r = joystick.getBoundingClientRect();
            const dx = e.touches[0].clientX - (r.left + r.width/2);
            const dy = e.touches[0].clientY - (r.top + r.height/2);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
            const ang = Math.atan2(dy, dx);
            moveDir.x = Math.cos(ang) * (dist / 40);
            moveDir.z = Math.sin(ang) * (dist / 40);
            stick.style.transform = `translate(${moveDir.x * 40}px, ${moveDir.z * 40}px)`;
        });
        joystick.addEventListener('touchend', () => { moveDir = {x:0, z:0}; stick.style.transform = `translate(0,0)`; });
        document.getElementById('attack-btn').addEventListener('touchstart', (e) => { e.preventDefault(); doAttack(); });

        function animate() {
            requestAnimationFrame(animate);
            if(moveDir.x !== 0 || moveDir.z !== 0) {
                playerGroup.position.x += moveDir.x * moveSpeed;
                playerGroup.position.z += moveDir.z * moveSpeed;
                playerGroup.rotation.y = Math.atan2(-moveDir.x, -moveDir.z);
                channel.send({ type: 'broadcast', event: 'move', payload: { id: myId, x: playerGroup.position.x, z: playerGroup.position.z, r: playerGroup.rotation.y } });
            }

            if(isAttacking) {
                const p = (Date.now() - attackTime) / 300;
                sword.position.y = 1.1 - p * 1.5; sword.rotation.x = Math.PI/4 + p * Math.PI;
            } else {
                sword.position.set(0.4, 1.1, 0.4); sword.rotation.set(Math.PI/4, 0, 0);
            }

            camera.position.lerp(new THREE.Vector3(playerGroup.position.x, 12, playerGroup.position.z + 18), 0.1);
            camera.lookAt(playerGroup.position);
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
<script src="https://dmamax.netlify.app/legal-module.js"></script>

</body>
</html>
